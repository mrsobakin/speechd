[daemon]
# Command to type the transcribed text (required)
typer = ["wtype", "-"]

# Maximum recording duration in seconds (optional, default: 300)
# [daemon.recorder]
# timeout = 300

# Runtime directory for pid file and recording indicator
# (optional, default: $XDG_RUNTIME_DIR or /tmp)
# runtime_dir = "/run/user/1000"

# Path to indicator file containing current state
# States: "recording" or "transcribing"
# (optional, default: $XDG_RUNTIME_DIR/speechd.state)
# indicator_file = "/run/user/1000/speechd.state"


[pipeline.engine]
# Groq API key (required)
api_key = "gsk_xxx"

# Whisper model to use (optional, default: whisper-large-v3-turbo)
# model = "whisper-large-v3-turbo"

# Language code for transcription (optional)
# If unset, Whisper will auto-detect the language
# language = "en"

# Initial prompt for whisper (optional)
# prompt = ""

# Opus encoding quality, 0.0 to 1.0 (optional, default: 0.8)
# audio_quality = 0.8


[[pipeline.pre]]
type = "agc"

[[pipeline.pre]]
type = "vad"


[[pipeline.post]]
type = "deemdasher"
